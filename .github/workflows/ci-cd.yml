name: Build Push and Update ArgoCD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: parking_app
  DOCKER_REPO: vadivelu123

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t $DOCKER_REPO/$IMAGE_NAME:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push $DOCKER_REPO/$IMAGE_NAME:${{ github.sha }}

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|image:.*|image: $DOCKER_REPO/$IMAGE_NAME:${{ github.sha }}|g" k8s/deployment.yaml

    - name: Commit Manifest Changes
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com

        git add k8s/deployment.yaml

        git commit -m "Updated image tag to ${{ github.sha }}" || echo "No changes"

        git push
