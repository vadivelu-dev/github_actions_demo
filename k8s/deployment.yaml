apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp
        image: vadivelu123/parking_app:latest

        ports:
        - containerPort: 8080
